<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Real Labs</title>
    <meta name="description" content="Anti-Real Labs — The contradiction of reality.">
    <meta property="og:title" content="Anti-Real Labs">
    <meta property="og:description" content="The contradiction of reality.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://antireallabs.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050505;
            --text: #d4d0ca;
            --text-dim: #3a3835;
            --text-ghost: #1e1d1b;
            --accent: #b8a58a;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', Georgia, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: crosshair;
        }

        canvas#void {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.4;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 10;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .core {
            position: relative;
            z-index: 6;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
            animation: materialize 2.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes materialize {
            from {
                opacity: 0;
                transform: scale(0.96);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        .sigil {
            width: 160px;
            height: 160px;
            margin-bottom: 3rem;
            position: relative;
        }

        .sigil img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 60px rgba(184, 165, 138, 0.08));
            transition: filter 0.8s ease;
        }

        .sigil:hover img {
            filter: drop-shadow(0 0 80px rgba(184, 165, 138, 0.15));
        }

        .sigil::after {
            content: '';
            position: absolute;
            inset: -20px;
            border: 1px solid rgba(184, 165, 138, 0.06);
            border-radius: 50%;
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.04); opacity: 0.8; }
        }

        .name {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 1.5s ease 1s both;
        }

        .oracle {
            font-size: 1.6rem;
            font-weight: 300;
            font-style: italic;
            color: var(--accent);
            letter-spacing: 0.02em;
            line-height: 1.6;
            max-width: 420px;
            opacity: 0;
            animation: fadeIn 1.5s ease 1.8s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, transparent, var(--text-dim), transparent);
            margin: 2.5rem 0;
            opacity: 0;
            animation: fadeIn 1.5s ease 2.4s both;
        }

        .signal {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.6s ease;
            opacity: 0;
            animation: fadeIn 1.5s ease 3s both;
        }

        .signal:hover {
            color: var(--accent);
        }

        .epoch {
            position: fixed;
            bottom: 2rem;
            right: 2.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            color: var(--text-ghost);
            z-index: 6;
            writing-mode: vertical-rl;
            opacity: 0;
            animation: fadeIn 1.5s ease 3.5s both;
        }

        .coord {
            position: fixed;
            top: 2rem;
            left: 2.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            color: var(--text-ghost);
            z-index: 6;
            opacity: 0;
            animation: fadeIn 1.5s ease 3.5s both;
        }

        @media (max-width: 600px) {
            .sigil {
                width: 120px;
                height: 120px;
                margin-bottom: 2rem;
            }
            .name {
                font-size: 0.9rem;
                letter-spacing: 0.35em;
            }
            .oracle {
                font-size: 1.2rem;
                max-width: 300px;
            }
            .coord, .epoch {
                display: none;
            }
        }
    </style>
</head>
<body>

    <canvas id="void"></canvas>

    <span class="coord">6.2442° N, 75.5812° W</span>

    <div class="core">
        <div class="sigil">
            <img src="logo-dark.png" alt="ARL">
        </div>

        <h1 class="name">Anti-Real Labs</h1>

        <p class="oracle">The contradiction of reality<br>is our laboratory.</p>

        <div class="line"></div>

        <a href="mailto:admin@antireallabs.com" class="signal">admin@antireallabs.com</a>
    </div>

    <span class="epoch">MMXXVI</span>

    <script>
        const canvas = document.getElementById('void');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            const count = Math.floor((w * h) / 12000);
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.2 + 0.2,
                    dx: (Math.random() - 0.5) * 0.15,
                    dy: (Math.random() - 0.5) * 0.1,
                    alpha: Math.random() * 0.3 + 0.05,
                    pulse: Math.random() * Math.PI * 2,
                    pulseSpeed: Math.random() * 0.008 + 0.002
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            for (const p of particles) {
                p.x += p.dx;
                p.y += p.dy;
                p.pulse += p.pulseSpeed;

                if (p.x < -10) p.x = w + 10;
                if (p.x > w + 10) p.x = -10;
                if (p.y < -10) p.y = h + 10;
                if (p.y > h + 10) p.y = -10;

                const a = p.alpha * (0.5 + 0.5 * Math.sin(p.pulse));
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(184, 165, 138, ${a})`;
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => { resize(); createParticles(); });
        resize();
        createParticles();
        draw();

        let mx = -1000, my = -1000;
        document.addEventListener('mousemove', (e) => {
            mx = e.clientX;
            my = e.clientY;
        });

        setInterval(() => {
            for (const p of particles) {
                const ddx = p.x - mx;
                const ddy = p.y - my;
                const dist = Math.sqrt(ddx * ddx + ddy * ddy);
                if (dist < 120) {
                    p.dx += ddx * 0.0003;
                    p.dy += ddy * 0.0003;
                }
                p.dx *= 0.999;
                p.dy *= 0.999;
            }
        }, 16);
    </script>

</body>
</html>
